<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Голова робота -->
  <rect x="25" y="30" width="50" height="40" rx="10" fill="#1976d2"/>
  
  <!-- Глаза -->
  <circle cx="40" cy="45" r="5" fill="white"/>
  <circle cx="60" cy="45" r="5" fill="white"/>
  <circle cx="40" cy="45" r="2" fill="#1976d2"/>
  <circle cx="60" cy="45" r="2" fill="#1976d2"/>
  
  <!-- Излучение из глаз (AI эффект) -->
  <path d="M35 40 L25 25" stroke="#42a5f5" stroke-width="2" stroke-linecap="round"/>
  <path d="M65 40 L75 25" stroke="#42a5f5" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Антенна -->
  <line x1="50" y1="30" x2="50" y2="15" stroke="#1976d2" stroke-width="3"/>
  <circle cx="50" cy="10" r="4" fill="#42a5f5"/>
  
  <!-- Рот -->
  <path d="M35 60 Q50 70 65 60" stroke="white" stroke-width="2" fill="none"/>
  
  <!-- Мозг/сеть внутри -->
  <circle cx="45" cy="50" r="3" fill="#42a5f5" opacity="0.6"/>
  <circle cx="55" cy="58" r="3" fill="#42a5f5" opacity="0.6"/>
  <circle cx="40" cy="58" r="3" fill="#42a5f5" opacity="0.6"/>
  <path d="M45 50 L55 58 M45 50 L40 58 M55 58 L40 58" stroke="#42a5f5" stroke-width="1.5" opacity="0.5"/>
</svg>
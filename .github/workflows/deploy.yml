# .github/workflows/deploy.yml
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Триггер: запуск при пуше в ветку main

# Разрешения для деплоя
permissions:
  contents: write

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      # 1. Клонируем репозиторий
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Устанавливаем Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: 20 # Используйте вашу версию Node
          cache: npm

      # 3. Устанавливаем зависимости
      - name: Install dependencies
        run: npm ci # Чистая установка для CI

      # 4. Собираем сайт
      - name: Build website
        run: npm run build

      # 5. Деплоим на GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages # Ветка для публикации